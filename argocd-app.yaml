apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-gitops-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/PrabalPiya/devops-gitops-argocd-helm.git
    targetRevision: main
    path: helm/devops-app

  destination:
    server: https://kubernetes.default.svc
    namespace: devops-gitops

  syncPolicy:
    automated:
      prune: true
      selfHeal: true